<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrick Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #38bdf8; }
    p.subtitle { color: #94a3b8; margin-bottom: 20px; }
    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    nav button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    nav button:hover { background: #334155; }
    #gameCanvas {
      border: 2px solid #334155;
      border-radius: 8px;
      max-width: 100%;
      height: auto;
    }
    .controls {
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      text-align: center;
    }
    footer {
      margin-top: auto;
      padding-top: 24px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>🎮 Carrick Games</h1>
  <p class="subtitle">Retro collection built by Linus</p>
  <nav>
    <button onclick="loadGame('snake')">Snake</button>
  </nav>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="controls">
    Desktop: Arrow keys / WASD<br>
    Mobile: Tap sides to turn
  </div>
  <footer>Auto-deployed via GitHub Actions</footer>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
