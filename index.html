<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrick Games</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2339C5BB' d='M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #0f172a;
      --elevated: #111827;
      --border: rgba(57,197,187,0.12);
      --border-strong: rgba(57,197,187,0.35);
      --text: #f8fafc;
      --text-secondary: #94a3af;
      --accent: #39C5BB;
      --accent-hover: #2ea39a;
      --accent-dim: rgba(57,197,187,0.10);
      --shadow: 0 12px 40px rgba(0,0,0,0.45);
      --key-bg: #0b1221;
      --key-border: rgba(57,197,187,0.35);
      --key-text: #e2e8f0;
      --key-pressed: var(--accent);
      --key-pressed-text: #ffffff;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --elevated: #f1f5f9;
      --border: rgba(13,148,136,0.22);
      --border-strong: rgba(13,148,136,0.50);
      --text: #0f172a;
      --text-secondary: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --accent-dim: rgba(13,148,136,0.10);
      --shadow: 0 12px 40px rgba(0,0,0,0.10);
      --key-bg: #ffffff;
      --key-border: rgba(13,148,136,0.45);
      --key-text: #0f172a;
      --key-pressed: var(--accent);
      --key-pressed-text: #ffffff;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f8fafc;
        --surface: #ffffff;
        --elevated: #f1f5f9;
        --border: rgba(13,148,136,0.22);
        --border-strong: rgba(13,148,136,0.50);
        --text: #0f172a;
        --text-secondary: #64748b;
        --accent: #0d9488;
        --accent-hover: #0f766e;
        --accent-dim: rgba(13,148,136,0.10);
        --shadow: 0 12px 40px rgba(0,0,0,0.10);
        --key-bg: #ffffff;
        --key-border: rgba(13,148,136,0.45);
        --key-text: #0f172a;
        --key-pressed: var(--accent);
        --key-pressed-text: #ffffff;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans SC", sans-serif;
      min-height: 100vh;
      display: flex;
      transition: background .3s ease, color .3s ease;
    }

    /* Sidebar */
    .main-sidebar {
      width: 300px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      fill: var(--accent);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 34px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color .2s ease;
    }

    .search-wrap input::placeholder {
      color: var(--text-secondary);
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .brand-toggle {
      margin-left: auto;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }
    .brand-toggle:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .brand-toggle svg {
      width: 18px;
      height: 18px;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      grid-auto-rows: minmax(58px, auto);
      overflow-y: auto;
    }

    .game-list-item {
      text-align: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px 6px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      aspect-ratio: auto;
      min-height: 58px;
      overflow: hidden;
    }

    .game-list-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      margin-bottom: 4px;
    }
    .game-list-icon svg {
      width: 100%;
      height: 100%;
    }

    .game-list-item:hover {
      background: var(--accent-dim);
    }

    .game-list-group {
      grid-column: 1 / -1;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 12px 0 4px;
    }

    .game-list-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .game-list-item.active {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .game-list-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.25;
      word-break: break-word;
      hyphens: auto;
    }

    .game-list-desc {
      display: none;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 32px;
      gap: 18px;
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }

    .lang-switch, .theme-switch {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }

    .lang-switch button, .theme-switch button {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s ease, color .2s ease;
    }

    .theme-switch button svg {
      width: 16px;
      height: 16px;
    }

    .lang-switch button.active, .theme-switch button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    [data-theme="dark"] .lang-switch button.active,
    [data-theme="dark"] .theme-switch button.active {
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    .content-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ===== New game layout with side panels ===== */
    .game-layout {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .game-sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      align-self: center;
      min-width: 0;
    }

    .game-sidebar.stats-panel {
      width: 360px;
      min-width: 300px;
      max-width: 440px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }

    .game-sidebar.keyboard-panel {
      width: auto;
      flex: 0 1 560px;
      min-width: 340px;
      max-width: 660px;
      overflow-x: auto;
    }

    .game-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex: 0 0 auto;
      min-width: 0;
      max-width: 1100px;
    }

    /* Stats panel contents */
    .stats-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .stats-title {
      display: none;
    }
    .game-info-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .gic-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }
    .gic-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .gic-record {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--text-secondary);
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }
    .gic-value {
      color: var(--accent);
      font-weight: 600;
    }
    .stats-section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      color: var(--text-secondary);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .stats-row:last-child {
      border-bottom: none;
    }
    .stats-value {
      color: var(--accent);
      font-weight: 600;
    }
    .stats-empty {
      font-size: 0.95rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 16px 0;
    }
    .stats-live-score {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      padding: 8px 0;
      font-variant-numeric: tabular-nums;
    }

    /* Level grid in stats panel */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin: 8px 0 4px;
    }
    .level-grid-large {
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }
    .level-cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 4px;
      transition: background .15s, border-color .15s;
      min-width: 0;
    }
    .level-cell:hover {
      background: var(--accent-dim);
    }
    .level-cell.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .level-cell.current {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .level-cell.cleared {
      background: rgba(57,197,187,0.08);
    }
    .level-cell.locked {
      opacity: 0.45;
      cursor: default;
    }
    .level-cell .lc-num {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .level-grid-large .level-cell {
      border-radius: 6px;
      padding: 3px;
    }
    .level-grid-large .level-cell .lc-num {
      font-size: 0.75rem;
    }
    .level-grid-large .level-cell .lc-lock,
    .level-grid-large .level-cell .lc-check {
      font-size: 0.6rem;
    }
    .level-cell.locked .lc-num {
      color: var(--text-secondary);
    }
    .level-cell .lc-lock {
      font-size: 0.7rem;
      line-height: 1;
      margin-top: 2px;
    }
    .level-cell .lc-check {
      font-size: 0.8rem;
      line-height: 1;
      margin-top: 2px;
      color: var(--accent);
    }

    /* Driving state in stats panel */
    .driving-state {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .ds-speed {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4px 0;
    }
    .ds-gauge-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto;
    }
    .ds-gauge {
      width: 100%;
      height: 100%;
    }
    .ds-speed-val {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .ds-speed-label {
      font-size: 0.6rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
    .ds-gear, .ds-level {
      text-align: center;
      padding: 4px 0;
    }
    .ds-gear-val {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .ds-level-val {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .ds-gear-label, .ds-level-label {
      font-size: 0.55rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .level-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      padding: 8px 0;
    }
    .level-dots .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
    }
    .level-dots .dot.cleared {
      background: var(--accent);
    }
    .level-dots .dot.current {
      background: var(--text);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .ds-hint {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 6px 0;
    }

    /* Side panel keyboard sizing */
    .keyboard-panel .vkeyboard {
      --vk-unit: 38px;
      --vk-gap: 6px;
      padding: 12px 10px;
      margin: 0;
      min-width: 0;
      width: 100%;
    }
    .keyboard-panel .vkeyboard-row {
      min-width: 0;
    }
    .keyboard-panel .vkey {
      font-size: 0.72rem;
      min-width: 0;
      flex-shrink: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--vk-unit, 38px);
      line-height: 1;
    }

    .parking-steering {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .parking-steering-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .steering-wheel {
      width: 132px;
      height: 132px;
      color: var(--text);
      transform: rotate(var(--wheel-rotation, 0deg));
      transition: none;
      transform-origin: 50% 50%;
      will-change: transform;
    }
    .steering-wheel svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .steering-rim {
      fill: none;
      stroke: currentColor;
      stroke-width: 8;
    }
    .steering-spoke {
      fill: none;
      stroke: currentColor;
      stroke-width: 7;
      stroke-linecap: round;
    }
    .steering-grip {
      fill: none;
      stroke: var(--accent);
      stroke-width: 6;
      stroke-linecap: round;
      opacity: 0.9;
    }
    .steering-readout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .steering-readout span:first-child {
      color: var(--text);
      min-width: 42px;
      text-align: right;
    }

    /* Responsive: side panels stack below on narrow screens */
    @media (max-width: 1320px) {
      .game-layout {
        flex-direction: column;
        align-items: center;
      }
      .game-sidebar {
        width: 100%;
        max-width: 100%;
      }
      .game-center {
        order: 1;
      }
      .game-sidebar.stats-panel {
        order: 2;
      }
      .game-sidebar.keyboard-panel {
        order: 3;
      }
      .game-sidebar.stats-panel {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }
      .game-sidebar.keyboard-panel {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow-x: visible;
      }
    }

    @media (max-width: 960px) {
      .main-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      body {
        flex-direction: column;
      }
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .sidebar-toggle svg {
      width: 20px;
      height: 20px;
    }

    body.sidebar-collapsed .main-sidebar {
      transform: translateX(-100%);
    }

    body.sidebar-collapsed main {
      margin-left: 0;
    }

    @media (min-width: 961px) {
      body.sidebar-collapsed .main-sidebar {
        transform: none;
        width: 72px;
        min-width: 72px;
        padding: 16px 8px;
        align-items: center;
      }
      body.sidebar-collapsed main {
        margin-left: 0;
      }
      body.sidebar-collapsed .brand {
        justify-content: center;
      }
      body.sidebar-collapsed .brand-text {
        display: none;
      }
      body.sidebar-collapsed .brand-toggle {
        display: none;
      }
      body.sidebar-collapsed .search-wrap {
        display: none;
      }
      body.sidebar-collapsed .game-list {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      body.sidebar-collapsed .game-list-item {
        min-height: 44px;
        padding: 6px 2px;
      }
      body.sidebar-collapsed .game-list-group {
        display: none;
      }
      body.sidebar-collapsed .game-list-name {
        font-size: 0.68rem;
      }
    }

    @media (max-width: 960px) {
      .sidebar-toggle {
        display: flex;
      }
      .main-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 90;
        transition: transform .25s ease;
        box-shadow: var(--shadow);
      }
      body:not(.sidebar-collapsed) .main-sidebar::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.4);
        z-index: -1;
      }
      main {
        padding: 64px 16px 28px;
      }
    }

    .action-bar {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .05s ease, background .2s ease, border-color .2s ease, color .2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn[hidden] {
      display: none;
    }

    .sidebar-section {
      margin-top: 8px;
    }
    .sidebar-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .sidebar-record-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 5px 0;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }
    .sidebar-record-row:last-child {
      border-bottom: none;
    }
    .sidebar-record-row span:last-child {
      color: var(--text);
      font-weight: 600;
    }
    .records-section {
      margin-bottom: 8px;
      min-width: 200px;
    }
    .records-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .records-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .records-row:last-child {
      border-bottom: none;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .control-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }
    .control-group-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 0;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 0;
    }
    .control-keys {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .keycap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      padding: 0 6px;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    [data-theme="light"] .keycap {
      box-shadow: 0 2px 0 rgba(0,0,0,0.06);
    }

    .control-icon {
      width: 24px;
      height: 24px;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-icon svg {
      width: 20px;
      height: 20px;
    }

    .control-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .empty-state {
      color: var(--text-secondary);
      font-size: 0.875rem;
      padding: 24px 0;
      text-align: center;
    }

    .search-empty {
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 20px 14px;
      text-align: center;
      line-height: 1.5;
    }

    /* Virtual Keyboard - Standard 60% ANSI Layout */
    .vkeyboard {
      --vk-unit: 26px;
      --vk-gap: 3px;
      display: flex;
      flex-direction: column;
      gap: var(--vk-gap);
      margin-top: 14px;
      user-select: none;
      padding: 12px;
      background: var(--elevated);
      border-radius: 10px;
      border: 1px solid var(--border);
      max-width: 100%;
      overflow-x: auto;
    }

    .vkeyboard-row {
      display: flex;
      gap: var(--vk-gap);
      justify-content: center;
      min-width: max-content;
    }

    .vkey {
      height: calc(var(--vk-unit) * 1.15);
      min-width: var(--vk-unit);
      padding: 0 4px;
      background: var(--key-bg);
      border: 1px solid var(--key-border);
      border-radius: 5px;
      color: var(--key-text);
      font-size: 0.58rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .05s ease, background .1s ease, border-color .1s ease, color .1s ease;
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
      flex: 1 1 var(--vk-unit);
      cursor: default;
    }

    [data-theme="light"] .vkey {
      box-shadow: 0 2px 0 rgba(0,0,0,0.08);
    }

    .vkey.pressed {
      background: var(--key-pressed);
      border-color: var(--key-pressed);
      color: var(--key-pressed-text);
      transform: translateY(2px);
      box-shadow: none;
    }

    .vkey.inactive {
      opacity: 0.25;
      pointer-events: none;
      box-shadow: none;
    }

    .vkey.spacer {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      pointer-events: none;
      opacity: 0;
      flex: 0.5;
    }

    /* Width modifiers based on ANSI standard proportions */
    .vkey.w-1     { flex: 1; }
    .vkey.w-1-25  { flex: 1.25; }
    .vkey.w-1-5   { flex: 1.5; }
    .vkey.w-1-75  { flex: 1.75; }
    .vkey.w-2     { flex: 2; }
    .vkey.w-2-25  { flex: 2.25; }
    .vkey.w-2-5   { flex: 2.5; }
    .vkey.w-2-75  { flex: 2.75; }
    .vkey.w-6     { flex: 6; }
    .vkey.w-6-25  { flex: 6.25; }

    /* Compact panel (Simon etc) */
    .vkeyboard-compact {
      gap: 10px;
      padding: 16px;
      min-width: auto;
    }

    .vkeyboard-compact .vkeyboard-row {
      gap: 10px;
      min-width: auto;
    }

    .vkeyboard-compact .vkey {
      min-width: 56px;
      height: 56px;
      border-radius: 10px;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      flex: 0 0 56px;
      cursor: pointer;
    }

    .vkey.simon-red {
      border-color: rgba(251,113,133,0.6);
      color: #ffe4e6;
    }

    .vkey.simon-blue {
      border-color: rgba(96,165,250,0.6);
      color: #dbeafe;
    }

    .vkey.simon-green {
      border-color: rgba(94,234,212,0.6);
      color: #ccfbf1;
    }

    .vkey.simon-yellow {
      border-color: rgba(250,204,21,0.6);
      color: #fef3c7;
    }

    .vkey.simon-red.pressed {
      background: #fb7185;
      border-color: #fb7185;
      color: #ffffff;
    }

    .vkey.simon-blue.pressed {
      background: #60a5fa;
      border-color: #60a5fa;
      color: #ffffff;
    }

    .vkey.simon-green.pressed {
      background: #2dd4bf;
      border-color: #2dd4bf;
      color: #082f49;
    }

    .vkey.simon-yellow.pressed {
      background: #facc15;
      border-color: #facc15;
      color: #1f2937;
    }

    .canvas-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s;
    }

    .icon-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Game record badge */
    .game-record {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 6px;
    }

    .game-record svg {
      width: 14px;
      height: 14px;
    }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .loading-overlay.active {
      display: flex;
    }

    .start-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      z-index: 9;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }
    .start-overlay.active {
      display: flex;
    }
    .start-overlay-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .start-overlay-hint {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      width: 100%;
      max-width: 560px;
    }

    .canvas-wrapper {
      position: relative;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: cg-spin .6s linear infinite;
    }
    @keyframes cg-spin { to { transform: rotate(360deg); } }

    /* Fullscreen canvas */
    .canvas-wrapper.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 200;
      background: var(--bg);
      justify-content: center;
      gap: 0;
      padding: 20px;
    }

    .canvas-wrapper.fullscreen #gameCanvas {
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 40px);
      width: auto;
      height: auto;
    }

    #gameCanvas {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background: var(--bg);
      max-width: 100%;
      height: auto;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>
  <aside class="main-sidebar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </svg>
      <span class="brand-text">Carrick Games</span>
      <button class="brand-toggle" id="sidebarToggleBtn" aria-label="Toggle sidebar">
        <svg class="icon-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/>
        </svg>
        <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M13 17l5-5-5-5M6 17l5-5-5-5"/>
        </svg>
      </button>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M21 21l-4.35-4.35"></path>
      </svg>
      <input type="text" id="searchInput" placeholder="Search games / 搜索游戏">
    </div>

    <div class="game-list" id="gameList"></div>
  </aside>

  <main>
    <div class="topbar">
      <div class="lang-switch" aria-label="Language">
        <button class="lang-btn" data-lang="en">En</button>
        <button class="lang-btn" data-lang="zh">中</button>
      </div>
      <div class="theme-switch" aria-label="Theme">
        <button class="theme-btn" data-set="light" aria-label="Light">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button class="theme-btn" data-set="dark" aria-label="Dark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <button class="theme-btn" data-set="system" aria-label="System">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 3v18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="game-layout" id="gameLayout">
      <aside class="game-sidebar stats-panel" id="statsPanel"></aside>

      <div class="game-center">
        <div class="game-meta" hidden>
          <h2 id="gameTitle">—</h2>
          <p id="gameDesc"></p>
        </div>
        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="gameCanvas" width="400" height="500"></canvas>
          <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
          <div class="start-overlay" id="startOverlay">
            <div class="start-overlay-title"></div>
            <div class="start-overlay-hint"></div>
          </div>
          <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
        </div>
        <div class="action-bar">
          <button class="btn btn-primary" id="actionBtn">Start Game</button>
          <button class="btn btn-secondary" id="demoBtn" hidden>Demo</button>
        </div>
      </div>

      <aside class="game-sidebar keyboard-panel" id="keyboardPanel"></aside>
    </div>
  </main>

  <script>
    (function(){
      document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => window.setLang(b.dataset.lang)));
      document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', () => window.setTheme(b.dataset.set)));

      // Sidebar toggle
      const toggle = document.getElementById('sidebarToggle');
      const brandToggle = document.getElementById('sidebarToggleBtn');
      const body = document.body;

      function setSidebarCollapsed(collapsed) {
        body.classList.toggle('sidebar-collapsed', collapsed);
        if (brandToggle) {
          const collapseIcon = brandToggle.querySelector('.icon-collapse');
          const expandIcon = brandToggle.querySelector('.icon-expand');
          if (collapseIcon) collapseIcon.style.display = collapsed ? 'none' : 'block';
          if (expandIcon) expandIcon.style.display = collapsed ? 'block' : 'none';
        }
        try {
          localStorage.setItem('cg-sidebar-collapsed', collapsed ? '1' : '0');
        } catch {}
      }

      function isSidebarCollapsed() {
        try {
          const v = localStorage.getItem('cg-sidebar-collapsed');
          if (v !== null) return v === '1';
        } catch {}
        return window.innerWidth <= 960;
      }

      if (toggle) {
        toggle.addEventListener('click', () => {
          setSidebarCollapsed(!body.classList.contains('sidebar-collapsed'));
        });
      }

      if (brandToggle) {
        brandToggle.addEventListener('click', () => {
          setSidebarCollapsed(!body.classList.contains('sidebar-collapsed'));
        });
      }

      // Close sidebar when clicking outside on mobile
      document.addEventListener('click', (e) => {
        if (window.innerWidth > 960) return;
        const aside = document.querySelector('.main-sidebar');
        if (!aside) return;
        const clickToggle = toggle && (e.target === toggle || toggle.contains(e.target));
        const clickBrandToggle = brandToggle && (e.target === brandToggle || brandToggle.contains(e.target));
        if (!body.classList.contains('sidebar-collapsed') && !aside.contains(e.target) && !clickToggle && !clickBrandToggle) {
          setSidebarCollapsed(true);
        }
      });

      // Initialize sidebar state
      setSidebarCollapsed(isSidebarCollapsed());
    })();
  </script>
  <script type="module" src="./dist/main.js?v=10"></script>
</body>
</html>
