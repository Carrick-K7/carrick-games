<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrick Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎮%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #0f172a;
      --elevated: #111827;
      --border: rgba(57,197,187,0.12);
      --border-strong: rgba(57,197,187,0.35);
      --text: #f8fafc;
      --text-secondary: #94a3af;
      --accent: #39C5BB;
      --accent-hover: #2ea39a;
      --accent-dim: rgba(57,197,187,0.10);
      --shadow: 0 12px 40px rgba(0,0,0,0.45);
      --key-bg: #0b1221;
      --key-border: rgba(57,197,187,0.35);
      --key-text: #e2e8f0;
      --key-pressed: var(--accent);
      --key-pressed-text: #ffffff;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --elevated: #f1f5f9;
      --border: rgba(13,148,136,0.22);
      --border-strong: rgba(13,148,136,0.50);
      --text: #0f172a;
      --text-secondary: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --accent-dim: rgba(13,148,136,0.10);
      --shadow: 0 12px 40px rgba(0,0,0,0.10);
      --key-bg: #ffffff;
      --key-border: rgba(13,148,136,0.45);
      --key-text: #0f172a;
      --key-pressed: var(--accent);
      --key-pressed-text: #ffffff;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f8fafc;
        --surface: #ffffff;
        --elevated: #f1f5f9;
        --border: rgba(13,148,136,0.22);
        --border-strong: rgba(13,148,136,0.50);
        --text: #0f172a;
        --text-secondary: #64748b;
        --accent: #0d9488;
        --accent-hover: #0f766e;
        --accent-dim: rgba(13,148,136,0.10);
        --shadow: 0 12px 40px rgba(0,0,0,0.10);
        --key-bg: #ffffff;
        --key-border: rgba(13,148,136,0.45);
        --key-text: #0f172a;
        --key-pressed: var(--accent);
        --key-pressed-text: #ffffff;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans SC", sans-serif;
      min-height: 100vh;
      display: flex;
      transition: background .3s ease, color .3s ease;
    }

    /* Sidebar */
    aside {
      width: 300px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      fill: var(--accent);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 34px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color .2s ease;
    }

    .search-wrap input::placeholder {
      color: var(--text-secondary);
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .game-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .game-list-item {
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }

    .game-list-item:hover {
      background: var(--accent-dim);
    }

    .game-list-item.active {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .game-list-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .game-list-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
      line-height: 1.35;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 32px;
      gap: 18px;
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }

    .lang-switch, .theme-switch {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }

    .lang-switch button, .theme-switch button {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s ease, color .2s ease;
    }

    .theme-switch button svg {
      width: 16px;
      height: 16px;
    }

    .lang-switch button.active, .theme-switch button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    [data-theme="dark"] .lang-switch button.active,
    [data-theme="dark"] .theme-switch button.active {
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 960px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
      aside {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      body {
        flex-direction: column;
      }
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .game-meta {
      text-align: center;
    }

    .game-meta h2 {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .game-meta p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    #gameCanvas {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background: var(--bg);
      max-width: 100%;
      height: auto;
      box-shadow: var(--shadow);
    }

    .action-bar {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .05s ease, background .2s ease, border-color .2s ease, color .2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .controls-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .control-group-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 10px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }

    .control-keys {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .keycap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      padding: 0 6px;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    [data-theme="light"] .keycap {
      box-shadow: 0 2px 0 rgba(0,0,0,0.06);
    }

    .control-icon {
      width: 24px;
      height: 24px;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-icon svg {
      width: 20px;
      height: 20px;
    }

    .control-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .empty-state {
      color: var(--text-secondary);
      font-size: 0.875rem;
      padding: 24px 0;
      text-align: center;
    }

    /* Virtual Keyboard */
    .vkeyboard {
      --vk-gap: 4px;
      display: flex;
      flex-direction: column;
      gap: var(--vk-gap);
      margin-top: 10px;
      user-select: none;
    }

    .vkeyboard-row {
      display: flex;
      gap: var(--vk-gap);
      justify-content: center;
    }

    .vkey {
      min-width: 22px;
      height: 22px;
      padding: 0 5px;
      background: var(--key-bg);
      border: 1px solid var(--key-border);
      border-radius: 5px;
      color: var(--key-text);
      font-size: 0.65rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .05s ease, background .1s ease, border-color .1s ease, color .1s ease;
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }

    [data-theme="light"] .vkey {
      box-shadow: 0 2px 0 rgba(0,0,0,0.08);
    }

    .vkey.wide-1 { min-width: 32px; }
    .vkey.wide-2 { min-width: 42px; }
    .vkey.wide-3 { min-width: 52px; }
    .vkey.wide-4 { min-width: 76px; }
    .vkey.wide-5 { min-width: 110px; }
    .vkey.grow { flex: 1; min-width: 22px; }

    .vkey.pressed {
      background: var(--key-pressed);
      border-color: var(--key-pressed);
      color: var(--key-pressed-text);
      transform: translateY(2px);
      box-shadow: none;
    }

    .vkey.hidden { visibility: hidden; }

    .vkey-hint {
      font-size: 0.55rem;
      color: var(--accent);
      margin-left: 2px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <aside>
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </svg>
      Carrick Games
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M21 21l-4.35-4.35"></path>
      </svg>
      <input type="text" id="searchInput" placeholder="Search games / 搜索游戏">
    </div>

    <div class="game-list" id="gameList"></div>
  </aside>

  <main>
    <div class="topbar">
      <div class="lang-switch" aria-label="Language">
        <button class="lang-btn" data-lang="en">En</button>
        <button class="lang-btn" data-lang="zh">中</button>
      </div>
      <div class="theme-switch" aria-label="Theme">
        <button class="theme-btn" data-set="light" aria-label="Light">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button class="theme-btn" data-set="dark" aria-label="Dark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <button class="theme-btn" data-set="system" aria-label="System">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 3v18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="content-grid">
      <div class="stage">
        <div class="game-meta">
          <h2 id="gameTitle">—</h2>
          <p id="gameDesc">—</p>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="action-bar">
          <button class="btn btn-primary" id="actionBtn">Start Game</button>
        </div>
      </div>

      <div class="controls-panel" id="controlsPanel">
        <div class="empty-state">Select a game to see controls</div>
      </div>
    </div>
  </main>

  <script>
    (function(){
      document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => window.setLang(b.dataset.lang)));
      document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', () => window.setTheme(b.dataset.set)));
    })();
  </script>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
