<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrick Games</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --elevated: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827;
      --text-secondary: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --canvas-border: #d1d5db;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    [data-theme="dark"] {
      --bg: #020617;
      --surface: #0b1221;
      --elevated: #111827;
      --border: #1f2937;
      --text: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --canvas-border: #334155;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #020617;
        --surface: #0b1221;
        --elevated: #111827;
        --border: #1f2937;
        --text: #f3f4f6;
        --text-secondary: #9ca3af;
        --accent: #38bdf8;
        --accent-hover: #0ea5e9;
        --canvas-border: #334155;
        --shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 20px;
      transition: background .3s ease, color .3s ease;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: min(900px, 100%);
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: background .3s ease, border-color .3s ease;
    }

    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }

    .theme-toggle button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s ease, color .2s ease;
    }

    .theme-toggle button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    [data-theme="dark"] .theme-toggle button.active {
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav button {
      background: var(--elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: transform .05s ease, background .2s ease, border-color .2s ease;
    }

    nav button:hover {
      background: var(--surface);
      border-color: var(--accent);
    }

    nav button:active {
      transform: translateY(1px);
    }

    #gameCanvas {
      border: 1px solid var(--canvas-border);
      border-radius: 12px;
      max-width: 100%;
      height: auto;
      background: var(--bg);
    }

    .controls {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.5;
    }

    footer {
      margin-top: auto;
      padding-top: 24px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="brand">
        <h1>Carrick Games</h1>
        <p>Retro collection built by Linus</p>
      </div>
      <div class="theme-toggle" aria-label="Theme">
        <button data-set="light">Light</button>
        <button data-set="dark">Dark</button>
        <button data-set="system">Auto</button>
      </div>
    </header>

    <nav>
      <button onclick="loadGame('snake')">Snake</button>
      <button onclick="loadGame('breakout')">Breakout</button>
      <button onclick="loadGame('tetris')">Tetris</button>
    </nav>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls" id="controlsText">
      Desktop: Arrow keys / WASD<br>
      Mobile: Tap sides to turn
    </div>

    <footer>
      Auto-deployed via GitHub Actions
    </footer>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const btns = document.querySelectorAll('.theme-toggle button');
      const saved = localStorage.getItem('cg-theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)');

      function apply(mode) {
        if (mode === 'light' || mode === 'dark') {
          root.setAttribute('data-theme', mode);
        } else {
          root.removeAttribute('data-theme');
        }
        btns.forEach(b => b.classList.toggle('active', b.dataset.set === mode));
        localStorage.setItem('cg-theme', mode);
      }

      btns.forEach(b => b.addEventListener('click', () => apply(b.dataset.set)));

      if (saved) {
        apply(saved);
      } else {
        apply('system');
      }

      systemDark.addEventListener?.('change', () => {
        if (!localStorage.getItem('cg-theme') || localStorage.getItem('cg-theme') === 'system') {
          apply('system');
        }
      });
    })();
  </script>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
