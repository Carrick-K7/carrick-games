name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "=== Deploying Games ==="
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "sudo mkdir -p $DEPLOY_PATH && sudo chown -R \$USER:\$USER $DEPLOY_PATH"

          mkdir -p _deploy
          cp index.html _deploy/
          cp -r dist _deploy/
          cp -r fonts _deploy/ 2>/dev/null || true

          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" ./_deploy/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

          echo "=== Games deployed to $DEPLOY_PATH ==="
          rm -f ~/.ssh/deploy_key
