name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: carrick-games-production
  cancel-in-progress: false

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Package release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          mkdir -p release
          cp index.html release/
          cp -R dist release/dist
          if [ -d fonts ]; then
            cp -R fonts release/fonts
          fi
          tar -C release -czf release.tar.gz .
          tar -tzf release.tar.gz

      - name: Upload release artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: carrick-games-release
          path: release.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: carrick-games-release

      - name: Verify deployment secrets
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_KEY"
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$DEPLOY_ROOT"
          test -n "$DEPLOY_URL"
          test -n "$DEPLOY_KNOWN_HOSTS"

      - name: Deploy release atomically
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail

          release="${RELEASE_ID:0:12}"
          deploy_root="${DEPLOY_ROOT%/}"
          remote_tmp="/tmp/carrick-games-${release}.tar.gz"

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

          scp -i ~/.ssh/deploy_key release.tar.gz "$SSH_USER@$SSH_HOST:$remote_tmp"
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_ROOT='$deploy_root' RELEASE='$release' REMOTE_TMP='$remote_tmp' bash -s" <<'REMOTE'
          set -euo pipefail

          release_dir="$DEPLOY_ROOT/releases/$RELEASE"
          mkdir -p "$release_dir"
          tar -xzf "$REMOTE_TMP" -C "$release_dir"

          test -f "$release_dir/index.html"
          test -f "$release_dir/dist/main.js"
          test -d "$release_dir/fonts"

          ln -sfn "releases/$RELEASE" "$DEPLOY_ROOT/current.new"
          mv -Tf "$DEPLOY_ROOT/current.new" "$DEPLOY_ROOT/current"
          rm -f "$REMOTE_TMP"

          mapfile -t old_releases < <(ls -1dt "$DEPLOY_ROOT"/releases/* 2>/dev/null | tail -n +6)
          if ((${#old_releases[@]})); then
            rm -rf "${old_releases[@]}"
          fi
          REMOTE

          curl --fail --silent --show-error --location "$DEPLOY_URL/" --output /tmp/carrick-games-index.html
          curl --fail --silent --show-error --location "$DEPLOY_URL/dist/main.js?v=8" --output /dev/null

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
